services:
  dockerproxy:
    container_name: axonix-dockerproxy
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - BUILD=1
      - POST=1
    restart: always

  stream:
    container_name: axonix-stream
    build: .
    command: ./target/release/stream_server
    ports:
      - "7040:7040"
    volumes:
      - ./docs:/workspace/docs:ro
    restart: always

  axonix:
    container_name: axonix
    build: .
    command: ./scripts/evolve.sh
    user: "${UID}:${GID}"
    volumes:
      - .:/workspace
      - ./IDENTITY.md:/workspace/IDENTITY.md:ro
      - ./scripts/evolve.sh:/workspace/scripts/evolve.sh:ro
      - ./deploy_key:/workspace/.ssh/id_ed25519:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=${TZ:-America/Indiana/Indianapolis}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - STREAM_URL=${STREAM_URL:-http://stream:7040/pipe}
      - GIT_SSH_COMMAND=ssh -i /workspace/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/workspace/.ssh/known_hosts
      - HOME=/workspace
      - CARGO_HOME=/workspace/.cargo
      - DOCKER_HOST=tcp://dockerproxy:2375
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-${TELEGRAM_TOKEN}}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AXONIX_BOT_TOKEN=${AXONIX_BOT_TOKEN}
      - MODEL=${MODEL:-claude-sonnet-4-6}
      - BLUESKY_IDENTIFIER=${BLUESKY_IDENTIFIER}
      - BLUESKY_APP_PASSWORD=${BLUESKY_APP_PASSWORD}
    depends_on:
      - dockerproxy
    profiles:
      - session
