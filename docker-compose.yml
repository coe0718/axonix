services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - BUILD=1
      - POST=1
    restart: always

  stream:
    build: .
    command: ./target/release/stream_server
    ports:
      - "7040:7040"
    volumes:
      - ./docs:/workspace/docs:ro
    restart: always

  axonix:
    build: .
    command: ./scripts/evolve.sh
    user: "${UID}:${GID}"
    volumes:
      - .:/workspace
      - ./IDENTITY.md:/workspace/IDENTITY.md:ro
      - ./scripts/evolve.sh:/workspace/scripts/evolve.sh:ro
      - ./deploy_key:/workspace/.ssh/id_ed25519:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GH_TOKEN=${GH_TOKEN}
      - STREAM_URL=${STREAM_URL:-http://stream:7040/pipe}
      - GIT_SSH_COMMAND=ssh -i /workspace/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/workspace/.ssh/known_hosts
      - HOME=/workspace
      - CARGO_HOME=/workspace/.cargo
      - DOCKER_HOST=tcp://dockerproxy:2375
    depends_on:
      - dockerproxy
    profiles:
      - session
